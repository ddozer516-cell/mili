<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حجز ملعبك | Kick Off</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    .booking-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(5, 25, 14, 0.75), rgba(5, 25, 14, 0.95)),
                  url('https://cdn.pixabay.com/photo/2016/11/29/03/42/michelangelo-1867121_1280.jpg');
      background-size: cover;
      background-position: center;
      padding: 20px;
    }
    .booking-form {
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }
    .booking-form h2 { text-align: center; margin-bottom: 25px; font-weight: 700;}
    .booking-form form { display: flex; flex-direction: column; }
    .booking-form input, .booking-form select {
      margin-bottom: 20px;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
    }
    .booking-form input::placeholder { color: #94a3b8; }
    .booking-form select option { background: #05190e; color: white; }
  </style>
</head>
<body>

  <section class="booking-page">
    <div class="booking-form glass-card">
      <h2>حجز ملعب كرة القدم</h2>
      <form>
        <input type="text" placeholder="اسمك بالكامل" required>
        <input type="tel" placeholder="رقم الهاتف" required>
        <select required>
          <option value="">اختر نوع الملعب</option>
          <option>الملعب الخماسي 5x5</option>
          <option>الملعب السباعي 7x7</option>
          <option>ستاد VIP المضيء</option>
        </select>
        <input type="date" required>
        <input type="time" required>
        <button type="submit" class="btn-gradient">تأكيد الحجز الآن</button>
      </form>
    </div>
  </section>

</body>
</html>
